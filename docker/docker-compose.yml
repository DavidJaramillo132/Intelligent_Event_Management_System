services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: eventos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-eventos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-eventos_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "127.0.0.1:5433:5432"  # Bind only to localhost in productioFn
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - eventos_net
    healthcheck:
      test: 
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-eventos_user} -d ${POSTGRES_DB:-eventos_db}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    read_only: false
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=postgres"

  # ── Backend Go API ────────────────────────────────────────────────────────
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      cache_from:
        - backend:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: backend:latest
    container_name: eventos_backend
    restart: unless-stopped
    env_file:
      - ../backend/.env # Load default env vars; override with .env in production
    environment:
      DATABASE_URL: 
        host=postgres 
        user=${POSTGRES_USER:-eventos_user} 
        password=${POSTGRES_PASSWORD:-change_me} 
        dbname=${POSTGRES_DB:-eventos_db} 
        port=5432 
        sslmode=disable 
        TimeZone=${TIMEZONE:-America/Guayaquil}
      PORT: ${PORT:-8080}
      ENV: ${ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      IA_SERVICE_URL: http://ia-service:8000
    ports:
      - "127.0.0.1:8081:8080"  # Bind to localhost; expose via Nginx in production
    depends_on:
      postgres:
        condition: service_healthy
      ia-service:
        condition: service_started
    networks:
      - eventos_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp
      - /run
    volumes:
      - uploads_data:/app/uploads
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=backend"
    user: "1000:1000"


  # ── IA Service (Python/FastAPI) ───────────────────────────────────────────
  ia-service:
    build:
      context: ../ia-service
      dockerfile: dockerfile
    container_name: eventos_ia
    restart: unless-stopped
    env_file:
      - ../ia-service/.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - eventos_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=ia-service"

  # ── Frontend React (with Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      cache_from:
        - frontend:latest
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: frontend:latest
    container_name: eventos_frontend
    restart: unless-stopped
    volumes:
      - ../frontend/public/videos:/usr/share/nginx/html/videos:ro
    ports:
      - "127.0.0.1:5174:80"  # Bind to localhost; expose via Nginx in production
    depends_on:
      - backend
    networks:
      - eventos_net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    read_only: false  # Nginx needs write access for logs and temp files
    tmpfs:
      - /var/run/nginx
      - /var/cache/nginx
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=frontend"


# ── Volumes for persistent data ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local


# ── Internal network ──────────────────────────────────────────────────────────
networks:
  eventos_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450
