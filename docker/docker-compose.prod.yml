version: '3.9'

# Production-optimized Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}  # Enforce password is set
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      options:
        max-size: "5m"
        max-file: "5"

  pgadmin:
    restart: always
    ports:
      - "127.0.0.1:5050:80"  # Keep internal only
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  backend:
    restart: always
    environment:
      ENV: production
      LOG_LEVEL: warn
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    logging:
      options:
        max-size: "5m"
        max-file: "5"

  frontend:
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      options:
        max-size: "5m"
        max-file: "5"
