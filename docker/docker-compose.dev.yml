version: '3.9'

# Development-optimized Docker Compose configuration
# Use with: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:

  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "5432:5432"  # Expose for local development
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  pgadmin:
    restart: unless-stopped
    ports:
      - "5050:80"  # Expose for local development
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  backend:
    restart: unless-stopped
    environment:
      ENV: development
      LOG_LEVEL: debug
    ports:
      - "8080:8080"  # Expose for local development
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G

  frontend:
    restart: unless-stopped
    ports:
      - "5173:80"  # Expose for local development
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
